name: Playwright E2E

on:
  push:
    branches: [main, genspark_ai_developer]
  pull_request:
    branches: [main, genspark_ai_developer]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Build + E2E
    timeout-minutes: 30
    runs-on: ubuntu-latest

    env:
      CI: '1'
      # Placeholder Supabase values let the app boot for E2E. These are NOT
      # secrets — they are intentionally fake. Real credentials are never
      # required for the deterministic, backend-independent E2E suite.
      NEXT_PUBLIC_SUPABASE_URL: https://e2e-placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: e2e-placeholder-anon-key
      SUPABASE_SERVICE_ROLE_KEY: e2e-placeholder-service-role-key
      NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_APP_NAME: PropPilot
      # Keep Sentry inert during CI E2E (no DSN, no source-map upload).
      NEXT_PUBLIC_SENTRY_DSN: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build (production)
        run: npm run build

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
